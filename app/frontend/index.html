<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eesho — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      font-family: 'DM Sans', sans-serif;
      background: #0d0d14;
      overflow: hidden;
      position: relative;
    }

    /* --- Blobs --- */
    .blobs {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.55;
    }

    .blob-1 { width: 420px; height: 420px; background: #7F77DD; top: -120px; left: -100px; animation: drift1 9s ease-in-out infinite alternate; }
    .blob-2 { width: 350px; height: 350px; background: #D4537E; bottom: -80px; right: -60px; animation: drift2 11s ease-in-out infinite alternate; }
    .blob-3 { width: 280px; height: 280px; background: #1D9E75; top: 40%; left: 50%; animation: drift3 13s ease-in-out infinite alternate; }
    .blob-4 { width: 200px; height: 200px; background: #EF9F27; bottom: 20%; left: 10%; animation: drift1 8s ease-in-out infinite alternate-reverse; }

    @keyframes drift1 { from { transform: translate(0,0) scale(1); } to { transform: translate(40px, 30px) scale(1.1); } }
    @keyframes drift2 { from { transform: translate(0,0) scale(1); } to { transform: translate(-30px, -40px) scale(0.95); } }
    @keyframes drift3 { from { transform: translate(-50%,-50%) scale(1); } to { transform: translate(-50%,-50%) scale(1.15) rotate(20deg); } }

    /* --- Dot grid overlay --- */
    .dots {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.3;
      background-image: radial-gradient(rgba(255,255,255,0.25) 1px, transparent 1px);
      background-size: 28px 28px;
      mask-image: radial-gradient(ellipse 60% 60% at 50% 50%, black 40%, transparent 100%);
      -webkit-mask-image: radial-gradient(ellipse 60% 60% at 50% 50%, black 40%, transparent 100%);
    }

    /* --- Card --- */
    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 0.5px solid rgba(255,255,255,0.18);
      border-radius: 24px;
      padding: 2.5rem 2.25rem 2rem;
      animation: slideUp 0.7s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(32px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* --- Brand --- */
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 2rem;
    }

    .brand-mark {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, #7F77DD, #D4537E);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand-mark svg { width: 18px; height: 18px; fill: #fff; }

    .brand-name {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 18px;
      color: #fff;
      letter-spacing: -0.5px;
    }

    /* --- Headings --- */
    .heading {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 26px;
      color: #fff;
      margin: 0 0 4px;
      letter-spacing: -0.5px;
      line-height: 1.2;
    }

    .subheading {
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      margin: 0 0 1.75rem;
    }

    /* --- Form fields --- */
    .field { margin-bottom: 1rem; }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: rgba(255,255,255,0.55);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    .field input {
      width: 100%;
      background: rgba(255,255,255,0.07);
      border: 0.5px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      padding: 11px 14px;
      font-size: 15px;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      transition: border-color 0.2s, background 0.2s;
      outline: none;
    }

    .field input::placeholder { color: rgba(255,255,255,0.25); }
    .field input:focus { border-color: rgba(127,119,221,0.8); background: rgba(127,119,221,0.12); }

    /* --- Options row --- */
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      margin-top: 0.25rem;
    }

    .check-label {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      user-select: none;
    }

    .check-label input[type="checkbox"] { accent-color: #7F77DD; width: 14px; height: 14px; }

    .forgot {
      font-size: 13px;
      color: #AFA9EC;
      text-decoration: none;
      cursor: pointer;
      transition: color 0.2s;
    }

    .forgot:hover { color: #7F77DD; }

    /* --- Primary button --- */
    .btn-login {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 12px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 15px;
      color: #fff;
      background: linear-gradient(135deg, #7F77DD 0%, #D4537E 100%);
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: opacity 0.2s, transform 0.15s;
    }

    .btn-login:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-login:active { transform: scale(0.98); }

    /* --- Divider --- */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 1.5rem 0;
    }

    .divider-line { flex: 1; height: 0.5px; background: rgba(255,255,255,0.12); }

    .divider-text { font-size: 12px; color: rgba(255,255,255,0.3); white-space: nowrap; }

    /* --- Social buttons --- */
    .socials { display: flex; gap: 10px; }

    .social-btn {
      flex: 1;
      padding: 10px;
      border: 0.5px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.7);
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: background 0.2s, border-color 0.2s;
    }

    .social-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.25); }
    .social-icon { width: 16px; height: 16px; flex-shrink: 0; }

    /* --- Sign up row --- */
    .signup-row {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 13px;
      color: rgba(255,255,255,0.4);
    }

    .signup-row a { color: #AFA9EC; text-decoration: none; font-weight: 500; cursor: pointer; transition: color 0.2s; }
    .signup-row a:hover { color: #7F77DD; }
  </style>
</head>
<body>

  <!-- Animated background blobs -->
  <div class="blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>
  </div>

  <!-- Dot grid -->
  <div class="dots"></div>

  <!-- Login card -->
  <div class="card">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
          <path d="M9 1L16 5V13L9 17L2 13V5L9 1Z"/>
        </svg>
      </div>
      <span class="brand-name">Eesho</span>
    </div>

    <h1 class="heading">Welcome back</h1>
    <p class="subheading">Sign in to continue your journey</p>

    <!-- Email -->
    <div class="field">
      <label for="email">Email address</label>
      <input id="email" type="email" placeholder="you@example.com" autocomplete="email" />
    </div>

    <!-- Password -->
    <div class="field">
      <label for="password">Password</label>
      <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" />
    </div>

    <!-- Remember / Forgot -->
    <div class="row">
      <label class="check-label">
        <input type="checkbox" /> Remember me
      </label>
      <a href="#" class="forgot">Forgot password?</a>
    </div>

    <!-- Sign in button -->
   <button class="btn-login" onclick="login()">Sign in</button>

    <!-- Divider -->
    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">or continue with</span>
      <div class="divider-line"></div>
    </div>

    <!-- Social buttons -->
    <div class="socials">
      <button class="social-btn" type="button">
        <!-- Google icon -->
        <svg class="social-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Google
      </button>
      <button class="social-btn" type="button">
        <!-- GitHub icon -->
        <svg class="social-icon" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.342-3.369-1.342-.454-1.155-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0 1 12 6.836a9.59 9.59 0 0 1 2.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.202 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.161 22 16.416 22 12c0-5.523-4.477-10-10-10z"/>
        </svg>
        GitHub
      </button>
    </div>

    <!-- Sign up link -->
    <div class="signup-row">
      Don't have an account? <a href="#">Create one free</a>
    </div>

  </div>
  <script>
  async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {
      const res = await fetch("http://localhost:3000/login", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (res.ok) {
        alert("Login Success 🚀");
      } else {
        alert(data.message);
      }

    } catch (err) {
      console.log(err);
      alert("Error connecting to backend");
    }
  }
</script>

</body>
</html>
